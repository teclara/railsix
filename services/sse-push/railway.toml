[build]
builder = "RAILPACK"
buildCommand = "cd sse-push && go build -o /app/out ."
watchPatterns = ["services/sse-push/**", "services/shared/**"]
checkSuites = "required"

[deploy]
startCommand = "/app/out"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
