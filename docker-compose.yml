services:
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1"]

  gtfs-static:
    build:
      context: services
      dockerfile: ../docker/Dockerfile.gtfs-static
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"

  realtime-poller:
    build:
      context: services
      dockerfile: ../docker/Dockerfile.realtime-poller
    depends_on: [nats, redis, gtfs-static]
    environment:
      NATS_URL: nats://nats:4222
      REDIS_ADDR: redis:6379
      METROLINX_API_KEY: ${METROLINX_API_KEY}
      GTFS_STATIC_ADDR: http://gtfs-static:8081

  departures-api:
    build:
      context: services
      dockerfile: ../docker/Dockerfile.departures-api
    ports:
      - "8082:8082"
    depends_on: [redis, gtfs-static]
    environment:
      PORT: "8082"
      REDIS_ADDR: redis:6379
      GTFS_STATIC_ADDR: http://gtfs-static:8081
      METROLINX_API_KEY: ${METROLINX_API_KEY}

  sse-push:
    build:
      context: services
      dockerfile: ../docker/Dockerfile.sse-push
    ports:
      - "8085:8085"
    depends_on: [nats]
    environment:
      PORT: "8085"
      NATS_URL: nats://nats:4222

  api-gateway:
    build:
      context: services
      dockerfile: ../docker/Dockerfile.api-gateway
    ports:
      - "8080:8080"
    depends_on: [departures-api, redis]
    environment:
      PORT: "8080"
      REDIS_ADDR: redis:6379
      GTFS_STATIC_ADDR: http://gtfs-static:8081
      DEPARTURES_ADDR: http://departures-api:8082
      SSE_PUSH_ADDR: http://sse-push:8085
      ALLOWED_ORIGINS: http://localhost:5173
