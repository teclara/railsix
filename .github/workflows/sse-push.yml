name: SSE Push

on:
  push:
    branches: [main]
    paths:
      - services/sse-push/**
      - services/shared/**
      - .github/workflows/sse-push.yml
  pull_request:
    paths:
      - services/sse-push/**
      - services/shared/**
      - .github/workflows/sse-push.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: services

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: services/go.work.sum

      - run: go vet ./sse-push/...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: services/go.work.sum

      - run: go test ./sse-push/... -v -race -short
