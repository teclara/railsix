name: API Gateway

on:
  push:
    branches: [main]
    paths:
      - services/api-gateway/**
      - services/shared/**
      - .github/workflows/api-gateway.yml
  pull_request:
    paths:
      - services/api-gateway/**
      - services/shared/**
      - .github/workflows/api-gateway.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: services

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: services/api-gateway/go.sum

      - run: go vet ./api-gateway/...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: services/api-gateway/go.sum

      - run: go test ./api-gateway/... -v -race -short
