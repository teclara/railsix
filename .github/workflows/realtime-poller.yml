name: Realtime Poller

on:
  push:
    branches: [main]
    paths:
      - services/realtime-poller/**
      - services/shared/**
      - .github/workflows/realtime-poller.yml
  pull_request:
    paths:
      - services/realtime-poller/**
      - services/shared/**
      - .github/workflows/realtime-poller.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: services

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: services/go.work.sum

      - run: go vet ./realtime-poller/...

      - run: go build -o /dev/null ./realtime-poller/...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: services/go.work.sum

      - run: go test ./realtime-poller/... -v -race -short
