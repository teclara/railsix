name: Web CI

on:
  push:
    paths: ['web/**']
  pull_request:
    paths: ['web/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run build
